<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ADpaz - Cadastro de Membros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-hover: #1b5e20;
            --bg-soft: #f4f7f6;
            --text-dark: #1a1c1e;
            --border-light: #e0e4e2;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-soft);
            color: var(--text-dark);
            padding: 20px 0;
        }

        .custom-container {
            max-width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0,0,0,0.05);
            margin: 0 auto 40px;
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, #ffffff 0%, #f8faf9 100%);
            padding: 40px 20px;
            border-bottom: 1px solid var(--border-light);
            text-align: center;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        h1 {
            font-weight: 800;
            font-size: 1.8rem;
            margin: 0;
            color: var(--text-dark);
        }

        .subtitle {
            color: #64748b;
            font-size: 1rem;
            margin-top: 5px;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary-color);
            letter-spacing: 1px;
            margin: 30px 0 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::after {
            content: "";
            height: 1px;
            background: var(--border-light);
            flex: 1;
        }

        .form-control, .form-select {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-light);
            font-size: 0.95rem;
            background-color: #fcfdfc;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #444;
        }

        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            border-radius: 12px;
            margin-top: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* UI feedback */
        .spinner {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            z-index: 10001;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
        }

        @media (max-width: 576px) {
            .custom-container { border-radius: 0; border: none; }
            body { padding: 0; }
            .form-header { padding: 30px 15px; }
        }
    </style>
</head>
<body>

    <div class="container my-md-4">
        <div class="custom-container mx-auto">
            <div class="form-header">
                <div class="logo-container">
                    <img src="logo.png" alt="Logo ADpaz">
                </div>
                <h1>ADpaz - Cidade Praia</h1>
                <p class="subtitle">Cadastro de Membros da Congregação</p>
            </div>

            <div class="p-4 p-md-5">
                <form id="memberForm">
                    <div class="section-title">Dados Pessoais</div>
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label>Nome Completo</label>
                            <input type="text" name="nome" class="form-control" placeholder="DIGITE O NOME COMPLETO" required>
                        </div>
                        <div class="col-md-4">
                            <label>CPF</label>
                            <input type="text" id="cpf" name="cpf" class="form-control" placeholder="000.000.000-00" maxlength="14">
                        </div>
                        <div class="col-sm-6">
                            <label>Data de Nascimento</label>
                            <input type="text" id="nascimento" name="nascimento" class="form-control" placeholder="DD/MM/AAAA" maxlength="10" required>
                        </div>
                        <div class="col-sm-6">
                            <label>Telefone</label>
                            <input type="tel" id="telefone" name="telefone" class="form-control" placeholder="(00) 00000-0000" maxlength="15" required>
                        </div>
                        <div class="col-12">
                            <label>E-mail</label>
                            <input type="email" name="email" class="form-control" placeholder="exemplo@email.com" required>
                        </div>
                        <div class="col-12">
                            <label>Endereço Residencial</label>
                            <input type="text" name="endereco" class="form-control" placeholder="RUA, NÚMERO, BAIRRO E CIDADE" required>
                        </div>
                        <div class="col-sm-6">
                            <label>Estado Civil</label>
                            <select id="estadoCivil" name="estadocivil" class="form-select" required>
                                <option value="" disabled selected>Selecione...</option>
                                <option value="Solteiro(a)">Solteiro(a)</option>
                                <option value="Casado(a)">Casado(a)</option>
                                <option value="Divorciado(a)">Divorciado(a)</option>
                                <option value="Viúvo(a)">Viúvo(a)</option>
                                <option value="Uniao Estavel">União Estável</option>
                            </select>
                        </div>
                        <div class="col-sm-6" id="dataCasamentoGroup" style="display:none;">
                            <label>Data de Casamento</label>
                            <input type="text" id="datacasamento" name="datacasamento" class="form-control" placeholder="DD/MM/AAAA" maxlength="10">
                        </div>
                    </div>

                    <div class="section-title">Dados Eclesiásticos</div>
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <label>Função</label>
                            <select name="funcao" class="form-select" required>
                                <option value="" disabled selected>Selecione...</option>
                                <option value="Pastor(a)">Pastor(a)</option>
                                <option value="Presbítero">Presbítero</option>
                                <option value="Diácono/Diaconisa">Diácono/Diaconisa</option>
                                <option value="Cooperador(a)">Cooperador(a)</option>
                                <option value="Membro">Membro</option>
                                <option value="Congregado(a)">Congregado(a)</option>
                            </select>
                        </div>
                        <div class="col-sm-6">
                            <label>Cargo/Ministério</label>
                            <select id="cargo" name="cargo" class="form-select">
                                <option value="" disabled selected>Selecione...</option>
                                <option value="Pastor Dirigente">Pastor Dirigente</option>
                                <option value="Co-Pastor">Co-Pastor</option>
                                <option value="Músico">Músico</option>
                                <option value="Recepcionista">Recepcionista</option>
                                <option value="Professor(a) de EBD">Professor(a) de EBD</option>
                                <option value="Tesoureiro(a)">Tesoureiro(a)</option>
                                <option value="Outro">Outro (Especificar)</option>
                            </select>
                        </div>
                        <div class="col-12" id="outroCargoGroup" style="display:none;">
                            <label>Especifique o Cargo</label>
                            <input type="text" id="outroCargo" name="outroCargo" class="form-control" placeholder="DIGITE O CARGO">
                        </div>
                        <div class="col-12">
                            <label>Situação Cadastral</label>
                            <select name="outro" class="form-select" required>
                                <option value="" disabled selected>Selecione...</option>
                                <option value="Em atividade">Em atividade</option>
                                <option value="Inativo">Inativo</option>
                                <option value="Ausente">Ausente</option>
                                <option value="Afastado">Afastado</option>
                                <option value="Mudou-se">Mudou-se</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label>Histórico e Observações</label>
                            <textarea name="historico" class="form-control" style="min-height: 100px;" placeholder="BATISMO, CARGOS ANTERIORES OU NOTAS..."></textarea>
                        </div>
                        <div class="col-12">
                            <label>Foto do Membro (Máx 300KB)</label>
                            <input type="file" id="foto" name="foto" accept="image/*" class="form-control" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">Finalizar Cadastro</button>
                </form>
            </div>
        </div>
    </div>

    <div id="spinner" class="spinner"></div>
    <div id="modalOverlay" class="modal-overlay"></div>
    
    <div id="successPopup" class="shadow-lg p-4 bg-white rounded text-center position-fixed top-50 start-50 translate-middle border" style="display:none; z-index:10001; width:90%; max-width:400px;">
        <h2 class="text-success fw-bold">Sucesso!</h2>
        <p class="my-3">Membro cadastrado com sucesso.</p>
        <button class="btn btn-success w-100" onclick="location.reload()">Novo Cadastro</button>
    </div>

    <div id="errorPopup" class="shadow-lg p-4 bg-white rounded text-center position-fixed top-50 start-50 translate-middle border" style="display:none; z-index:10001; width:90%; max-width:400px;">
        <h2 class="text-danger fw-bold">Erro</h2>
        <p id="errorMsg" class="my-3"></p>
        <button class="btn btn-secondary w-100" onclick="closePopup()">Tentar Novamente</button>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxeCcH-iW2pj9Udbmg6BCgf8Kf6_8V7KAGcN-UzicXTaz9dM8tos4cHztTz9GpCGWtK/exec';
        const form = document.getElementById('memberForm');

        // MÁSCARAS DE DADOS (DIGITÁVEIS)
        function aplicarMascaraData(e) {
            let v = e.target.value.replace(/\D/g, '').slice(0, 8);
            if (v.length >= 5) {
                v = v.replace(/^(\d{2})(\d{2})(\d{0,4})/, "$1/$2/$3");
            } else if (v.length >= 3) {
                v = v.replace(/^(\d{2})(\d{0,2})/, "$1/$2");
            }
            e.target.value = v;
        }

        document.getElementById('nascimento').addEventListener('input', aplicarMascaraData);
        document.getElementById('datacasamento').addEventListener('input', aplicarMascaraData);

        document.getElementById('cpf').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = v;
        });

        document.getElementById('telefone').addEventListener('input', e => {
            let v = e.target.value.replace(/\D/g, '');
            v = v.replace(/^(\d{2})(\d)/g, '($1) $2').replace(/(\d{5})(\d{4})$/, '$1-$2');
            e.target.value = v;
        });

        // TUDO EM MAIÚSCULO EXCETO EMAIL
        form.querySelectorAll('input[type="text"], textarea').forEach(input => {
            input.addEventListener('input', () => input.value = input.value.toUpperCase());
        });

        // LÓGICA DE EXIBIÇÃO CONDICIONAL
        document.getElementById('estadoCivil').addEventListener('change', function() {
            const isCasado = (this.value === 'Casado(a)' || this.value === 'Uniao Estavel');
            document.getElementById('dataCasamentoGroup').style.display = isCasado ? 'block' : 'none';
        });

        document.getElementById('cargo').addEventListener('change', function() {
            document.getElementById('outroCargoGroup').style.display = (this.value === 'Outro') ? 'block' : 'none';
        });

        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        // ENVIO DO FORMULÁRIO PARA O SCRIPT GOOGLE
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('foto').files[0];
            
            if (file && file.size > 300 * 1024) {
                alert("A foto deve ter no máximo 300KB para garantir o armazenamento.");
                return;
            }

            document.getElementById('spinner').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';

            try {
                const base64Foto = await toBase64(file);
                const formData = new FormData(form);
                
                if (formData.get('cargo') === 'Outro') {
                    formData.set('cargo', document.getElementById('outroCargo').value.toUpperCase());
                }
                formData.set('foto', base64Foto);

                const response = await fetch(scriptURL, { method: 'POST', body: formData });
                const result = await response.json();

                if (result.success) {
                    document.getElementById('successPopup').style.display = 'block';
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                document.getElementById('errorMsg').innerText = "Erro ao enviar: " + error.message;
                document.getElementById('errorPopup').style.display = 'block';
            } finally {
                document.getElementById('spinner').style.display = 'none';
            }
        });

        function closePopup() {
            document.getElementById('errorPopup').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
